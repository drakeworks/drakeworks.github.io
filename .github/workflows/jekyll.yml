name: Build and Deploy

on:
  push:
    branches: [ main ]
  repository_dispatch:
    types: [deploy-to-production, trigger-build]

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
        continue-on-error: ${{ github.repository == 'drakeworks/drakeworks.github.io-stage' }}

      - name: Build Status
        run: |
          if [ "${{ github.repository }}" = "drakeworks/drakeworks.github.io-stage" ]; then
            echo "✅ Staging build completed (deployment skipped)"
          else
            echo "✅ Production build completed"
          fi

  # Deployment job (production only)
  deploy:
    if: github.repository == 'drakeworks/drakeworks.github.io'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Setup artifact upload context
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 