name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production?'
        required: true
        default: false
        type: boolean

jobs:
  deploy:
    if: github.event.inputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PRODUCTION_TOKEN }}
          repository: drakeworks/drakeworks.github.io-stage
          path: staging

      - name: Checkout production repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PRODUCTION_TOKEN }}
          repository: drakeworks/drakeworks.github.io
          path: production

      - name: Clean up nested production folder
        run: |
          echo "Cleaning up any nested production folder..."
          cd production
          if [ -d "production" ]; then
            echo "Found nested production folder, removing it..."
            rm -rf production
            git add -A
            git commit -m "Remove nested production folder" || echo "No changes to commit"
          else
            echo "No nested production folder found"
          fi

      - name: Setup Ruby for staging build
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build staging site
        run: |
          echo "Building staging site..."
          cd staging
          bundle install
          bundle exec jekyll build
          echo "Staging site built successfully"

      - name: Copy source files and compiled CSS to production
        run: |
          echo "Copying source files and compiled CSS to production..."
          # Remove any existing nested production folder
          rm -rf production/production
          # Copy source files from staging to production (excluding built files)
          rsync -av --exclude='.git' --exclude='node_modules' --exclude='.github' --exclude='_site' --exclude='.sass-cache' staging/ production/
          # Copy only the compiled CSS file to production
          cp staging/_site/css/main.css production/css/main.css
          echo "Source files and compiled CSS copied successfully"

      - name: Commit and push to production
        run: |
          cd production
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit - repositories are already in sync"
          else
            git commit -m "Deploy from staging: $(date)"
            git push origin main
            echo "Changes committed and pushed to production"
          fi

      - name: Deploy Status
        run: |
          echo "✅ Deployment to production completed"
          echo "Production repository is up to date"
          echo "Site has been built and deployed directly" 