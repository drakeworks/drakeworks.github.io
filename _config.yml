# Site settings
title: "DrakeWorks"
description: "DrakeWorks is the professional portfolio & blog of Drake Kutz, blending product strategy, technical insight, and the lessons learned from a decade of remote work—plus the occasional Cajun recipe."
baseurl: ""
url: "https://drakeworks.github.io"

# Build settings
markdown: kramdown
permalink: /:title/
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Collections
collections:
  posts:
    output: true
    permalink: /:title/

# Tag Page Generator Configuration
# ... existing code ...

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .gitignore
  - .DS_Store 

# Sidebar settings
mailchimp-form: "http://eepurl.com/jf5CvE"
featured-posts: true

# Tag colors
tag-colors:
  programming: "#4643ec"
  games: "#ff4500"
  movies: "#f14979"
  security: "#de47e2"
  productivity: "#3eb99a"
  linux: "var(--dark-gray)"
  blockchain: "#00b894"
  cryptocurrency: "#fdcb6e"
  python: "#306998"
  digital-privacy: "#6c5ce7"
  project-management: "#e17055"
  product-management: "#0984e3"

paginate: 4
paginate_path: "/page/:num/" 