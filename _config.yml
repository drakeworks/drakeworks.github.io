# Site settings
title: "DrakeWorks"
description: "DrakeWorks is the professional portfolio & blog of Drake Kutz, blending product strategy, technical insight, and the lessons learned from a decade of remote work—plus the occasional Cajun recipe."
baseurl: ""
url: "https://drakeworks.github.io"

# Build settings
markdown: kramdown
permalink: /:title/
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Collections
collections:
  posts:
    output: true
    permalink: /:title/

# Tag Page Generator Configuration
# ... existing code ...

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .gitignore
  - .DS_Store 

# Sidebar settings
mailchimp-form: "http://eepurl.com/jf5CvE"
featured-posts: true

# Tag colors
tag-colors:
  development: "#4643ec"           # Vivid indigo
  blockchain: "#00b341"            # Strong tech green
  games: "#ff4500"                 # Blazing orange-red
  digital-privacy: "#6c5ce7"       # Bright periwinkle
  product-management: "#ff1a75"    # Fire engine red
  project-management: "#de47e2"    # Electric fuchsia
  cooking: "#a0382b"               # Paprika red-brown
  travel: "#3c6e47"                # Deep earthy green
  artificial-intelligence: "#9b00ff" # Electric violet purple

paginate: 4
paginate_path: "/page/:num/" 